<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - SkillHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Inscription</h1>

        <div id="success-popup" class="popup-overlay" style="display: none;">
            <div class="popup-content">
                <h2>Inscription réussie!</h2>
                <p>Inscription réussie ! Vous pouvez maintenant vous connecter.</p>
                <button onclick="closePopup()" class="btn-primary">Fermer</button>
            </div>
        </div>

        <form id="inscription-form">
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" required>
            </div>

            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirmer le mot de passe :</label>
                <input type="password" id="password_confirm" name="password_confirm" required>
            </div>

            <button type="submit" class="btn-primary">S'inscrire</button>
        </form>

        <a href="connexion.html" class="auth-link">Déjà inscrit ? Connectez-vous</a>
        <a href="../EC01/index.html" class="back-link">← Retour à l'accueil</a>
    </div>

    <script src="js/inscription.js"></script>
</body>
</html>
