<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SkillHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Connexion</h1>

        <div id="success-popup" class="popup-overlay" style="display: none;">
            <div class="popup-content">
                <h2>Succès!</h2>
                <p>Bienvenue Utilisateur Test ! Connexion réussie.</p>
                <button onclick="closePopup()" class="btn-primary">Fermer</button>
                <a href="dashboard/index.html" class="btn-link">Aller au Dashboard</a>
            </div>
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            <p>Email ou mot de passe incorrect.</p>
        </div>

        <form id="connexion-form">
            <div class="form-group">
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <p>Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>

        <div class="test-accounts">
            <h3>Comptes de test:</h3>
            <p><strong>test@skillhub.com</strong> / password123</p>
            <p><strong>admin@skillhub.com</strong> / admin123</p>
        </div>

        <a href="../EC01/index.html" class="back-link">← Retour à l'accueil</a>
    </div>

    <script src="js/connexion.js"></script>
</body>
</html>
