version: "3.8"

services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: skillhub-sonarqube
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    networks:
      - sonarqube-net

  mongodb:
    image: mongo:7
    container_name: skillhub-mongodb
    ports:
      - "27017:27017"
    networks:
      - sonarqube-net
    volumes:
      - mongodb_data:/data/db

  mysql:
    image: mysql:8.0
    container_name: skillhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skillhub
      MYSQL_USER: skillhub
      MYSQL_PASSWORD: skillhub
    ports:
      - "3306:3306"
    networks:
      - sonarqube-net
    volumes:
      - mysql_data:/var/lib/mysql

  sonarqube-db:
    image: postgres:15-alpine
    container_name: skillhub-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - sonarqube-net

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
  mongodb_data:
  mysql_data:

networks:
  sonarqube-net:
    driver: bridge
