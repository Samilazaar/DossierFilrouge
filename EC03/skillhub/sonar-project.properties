# Identification du projet
sonar.projectKey=skillhub
sonar.projectName=SkillHub - Plateforme de Formation
sonar.projectVersion=1.0

# Chemins sources
sonar.sources=src,templates,public/assets
sonar.exclusions=vendor/**,var/**,node_modules/**,public/bundles/**

# Langage principal
sonar.language=php

# Encodage
sonar.sourceEncoding=UTF-8

# PHP specifique
sonar.php.file.suffixes=php
sonar.php.exclusions=vendor/**,var/**

# Twig templates
sonar.html.file.suffixes=.html.twig,.twig

# CSS/JS
sonar.css.file.suffixes=.css
sonar.javascript.file.suffixes=.js

# Qualite gates - Seuils personnalises SkillHub
# Focus securite pour donnees apprenants (RGPD)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=templates/**/*

# Coverage (si PHPUnit configure)
# sonar.php.coverage.reportPaths=var/coverage/clover.xml
# sonar.php.tests.reportPath=var/coverage/junit.xml
